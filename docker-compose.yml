# Galactic Wars — produção em 1 Droplet (DigitalOcean).
# app = jogo (Node, serve client + API + motor de tick) com SQLite em volume.
# caddy = HTTPS automático (Let's Encrypt) + proxy reverso pro domínio.
services:
  app:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: "file:/data/prod.db"
      TICK_INTERVAL_SECONDS: "60"    # TURBO p/ testes (1 min). Produção real: 3600 (1h)
      JWT_SECRET: ${JWT_SECRET}   # vem do arquivo .env ao lado deste
      # E-mail (recuperação de senha). Preencha no .env depois de criar a caixa.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-contato@galacticwar.com.br}
      APP_URL: ${APP_URL:-https://galacticwar.com.br}
    volumes:
      - gw-data:/data             # SQLite persiste aqui (sobrevive a deploys)
    expose:
      - "3001"

  # ===== RUR — Round Ultra-Rápido (rur.galacticwar.com.br) =====
  # Mesma imagem do jogo, mas: tick de 5s, 3 rounds/dia (12h, 18h, 22h) e
  # banco SQLite SEPARADO (universo/contas próprios do RUR).
  app-rur:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: "file:/data/rur.db"
      TICK_INTERVAL_SECONDS: "5"            # ultra-rápido
      ROUND_TICKS: "1200"                   # 1200 × 5s = 100 min por round
      ROUND_START_TIMES: "12:00,18:00,22:00"
      RESET_LEAD_MINUTES: "10"              # zera (soft) 10 min antes de cada início
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-contato@galacticwar.com.br}
      APP_URL: ${APP_URL_RUR:-https://rur.galacticwar.com.br}
    volumes:
      - gw-rur-data:/data         # SQLite do RUR (separado do jogo principal)
    expose:
      - "3001"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on: [app, app-rur]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  # ===== Fórum do Universo: phpBB + MariaDB (imagens oficiais) =====
  forum-db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${FORUM_DB_ROOT_PASSWORD}
      MARIADB_DATABASE: phpbb
      MARIADB_USER: phpbb
      MARIADB_PASSWORD: ${FORUM_DB_PASSWORD}
    volumes:
      - forum-db:/var/lib/mysql

  forum:
    build: ./forum
    restart: unless-stopped
    depends_on: [forum-db]
    expose:
      - "80"
    volumes:
      - forum-data:/var/www/html

volumes:
  gw-data:
  gw-rur-data:
  caddy-data:
  caddy-config:
  forum-db:
  forum-data:
